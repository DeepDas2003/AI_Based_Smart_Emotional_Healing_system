<!DOCTYPE html>
<html>
<head>
    <title>Emotion AI</title>
</head>
<body>

<h2>AI Based Smart Emotional Healing System</h2>

<video id="video" width="400" autoplay></video>

<h3>📊 Results</h3>
<p id="emotion"></p>
<p id="confidence"></p>
<p id="reward"></p>
<p id="total"></p>
<p id="advice"></p>
<p id="task"></p>

<script>
const video = document.getElementById("video");
const canvas = document.createElement("canvas");
let totalReward = 0;
// webcam
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);
// reset first
fetch("/reset", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({task_id: "emotion-support"})
});
// auto capture
setInterval(() => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);
    const img = canvas.toDataURL("image/jpeg");
    fetch("/step", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({image: img})
    })
    .then(res => res.json())
    .then(data => {
        const obs = data.observation || {};
        document.getElementById("emotion").innerText =
            "Emotion: " + obs.emotion;
        document.getElementById("confidence").innerText =
            "Confidence: " + obs.confidence;
        document.getElementById("reward").innerText =
            "Reward: " + data.reward;
        totalReward = data.total_reward;
        document.getElementById("total").innerText =
            "Total Reward: " + totalReward;
        document.getElementById("advice").innerText =
            "Advice: " + obs.advice;
        document.getElementById("task").innerText =
            "Status: " + data.task_status;
        if (data.done) {
            totalReward = 0;
        }
    });
}, 15000);
</script>

</body>
</html>
